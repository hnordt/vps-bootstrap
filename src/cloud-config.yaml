#cloud-config

# NOTE:
# This cloud-config targets Debian-based systems. If you copy it manually,
# replace each ${{ ... }} placeholder before provisioning.

ssh_pwauth: false
disable_root: true

package_upgrade: true

packages:
  - ca-certificates
  - curl
  - exim4-daemon-light
  - fail2ban
  - gpg
  - bsd-mailx
  - ufw
  - unattended-upgrades

groups:
  - app

users:
  - name: deploy
    groups: [sudo]
    shell: /bin/bash
    lock_passwd: true
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys: ${{ __SSH_AUTHORIZED_KEYS__ }}

  - name: app
    system: true
    primary_group: app
    shell: /usr/sbin/nologin
    lock_passwd: true

write_files:
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root:root
    permissions: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

  - path: /etc/fail2ban/jail.d/sshd.local
    owner: root:root
    permissions: "0644"
    content: |
      [sshd]
      enabled = true
      backend = systemd
      banaction = ufw
      port = ssh
      maxretry = 5
      findtime = 10m
      bantime = 1h

  - path: /etc/app/.env
    owner: root:app
    permissions: "0640"
    defer: true
    content: |
      # Add app config and secrets as KEY=value lines.
      # Prefer injecting real secrets after provisioning.

  - path: /opt/app/server.mjs
    owner: root:root
    permissions: "0644"
    content: |
      import * as http from "node:http";
      import * as path from "node:path";

      const HOST = "127.0.0.1";
      const PORT = 3000;

      async function createCounter(name) {
        let sqlite;

        try {
          sqlite = await import("node:sqlite");
        } catch (error) {
          if (
            !(
              error?.code === "ERR_UNKNOWN_BUILTIN_MODULE" ||
              (error?.code === "ERR_MODULE_NOT_FOUND" &&
                String(error.message).includes("node:sqlite"))
            )
          ) {
            throw error;
          }

          console.warn(
            "node:sqlite is unavailable; using an in-memory visit counter",
          );

          let count = 0;

          return {
            increment() {
              count += 1;
              return count;
            },
          };
        }

        const db = new sqlite.DatabaseSync(
          path.join(process.env.STATE_DIRECTORY ?? ".", "app.db"),
        );

        db.exec("PRAGMA journal_mode = WAL");
        db.exec("PRAGMA synchronous = NORMAL");
        db.exec("PRAGMA busy_timeout = 5000");
        db.exec("PRAGMA foreign_keys = ON");

        db.exec(`
          CREATE TABLE IF NOT EXISTS counters (
            name TEXT PRIMARY KEY,
            value INTEGER NOT NULL DEFAULT 0 CHECK (value >= 0),
            updated_at TEXT NOT NULL DEFAULT (datetime('now'))
          )
        `);

        db.prepare(
          `INSERT INTO counters (name, value) VALUES (?, ?) ON CONFLICT(name) DO NOTHING`,
        ).run(name, 0);

        const increment =
          db.prepare(`UPDATE counters SET value = value + 1, updated_at = datetime('now') WHERE name = ? RETURNING value
        `);

        return {
          increment() {
            return increment.get(name).value;
          },
        };
      }

      const visitCounter = await createCounter("visits");

      const server = http.createServer((request, response) => {
        const visits = visitCounter.increment();

        response.writeHead(200, {
          "Content-Type": "text/plain; charset=utf-8",
        });

        response.end(`Visits: ${visits}\n`);
      });

      server.listen(PORT, HOST, () => {
        console.log(`Server listening on http://${HOST}:${PORT}`);
      });

  - path: /etc/systemd/system/app.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=Application server
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=app
      WorkingDirectory=/opt/app
      UMask=0077
      StateDirectory=app
      StateDirectoryMode=0700
      EnvironmentFile=-/etc/app/.env
      ExecStart=/usr/bin/node /opt/app/server.mjs
      Restart=always
      RestartSec=5
      NoNewPrivileges=true
      ProtectSystem=strict
      PrivateTmp=true

      [Install]
      WantedBy=multi-user.target

  - path: /run/Caddyfile
    owner: root:root
    permissions: "0644"
    content: |
      ${{ __PUBLIC_DOMAIN__ }} {
        encode zstd gzip

        header {
          defer

          Strict-Transport-Security "max-age=31536000"
          X-Content-Type-Options "nosniff"
          X-Frame-Options "DENY"
          Referrer-Policy "strict-origin-when-cross-origin"
        }

        reverse_proxy 127.0.0.1:3000 {
          header_up X-Forwarded-For {http.request.header.CF-Connecting-IP}
        }
      }

  - path: /run/litestream.yml
    owner: root:root
    permissions: "0600"
    content: |
      dbs:
        - path: /var/lib/app/app.db
          replica:
            type: file
            path: /var/backups/app

      # Cloudflare R2 example
      # dbs:
      #   - path: /var/lib/app/app.db
      #     replica:
      #       type: s3
      #       endpoint: https://YOUR_ACCOUNT_ID.r2.cloudflarestorage.com
      #       region: auto
      #       bucket: your-bucket
      #       path: app
      #       access-key-id: your-key-id
      #       secret-access-key: your-secret

runcmd:
  - set -eu

  # Set up UFW
  - |
    ufw default deny incoming
    ufw default allow outgoing
    ufw limit 22/tcp
    ufw --force enable
    ips_v4="$(curl -fsSL https://www.cloudflare.com/ips-v4)"
    ips_v6="$(curl -fsSL https://www.cloudflare.com/ips-v6)"
    for range in $ips_v4 $ips_v6; do
      ufw allow proto tcp from "$range" to any port 80,443
    done

  # Install Node.js 22.x for node:sqlite support
  - |
    curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
    echo "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_22.x nodistro main" > /etc/apt/sources.list.d/nodesource.list
    apt-get update
    apt-get install -y nodejs

  # Set up the app service
  - |
    systemctl daemon-reload
    systemctl enable --now app

  # Set up Caddy
  - |
    curl -fsSL https://dl.cloudsmith.io/public/caddy/stable/gpg.key | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
    curl -fsSL -o /etc/apt/sources.list.d/caddy-stable.list https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt
    apt-get update
    apt-get install -y caddy
    install -m 0644 /run/Caddyfile /etc/caddy/Caddyfile
    caddy validate --config /etc/caddy/Caddyfile
    systemctl restart caddy

  # Set up Litestream
  - |
    curl -fsSL -o /run/litestream.deb https://github.com/benbjohnson/litestream/releases/download/v0.5.8/litestream-0.5.8-linux-x86_64.deb
    apt-get install -y /run/litestream.deb
    install -m 0600 /run/litestream.yml /etc/litestream.yml
    systemctl enable litestream
    systemctl restart litestream

  # Apply unattended-upgrades reporting/reboot policy after bootstrap work
  # completes, so cloud-init package_upgrade runs with the image defaults.
  - |
    cat >/etc/apt/apt.conf.d/52unattended-upgrades-reboot-policy <<'EOF'
    Unattended-Upgrade::Automatic-Reboot "false";
    Unattended-Upgrade::Mail "root";
    Unattended-Upgrade::MailReport "on-change";
    EOF

power_state:
  mode: reboot

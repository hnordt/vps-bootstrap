#cloud-config

# NOTE:
# The target OS is Ubuntu 26.04 LTS, but this is expected to work on most
# Debian-based distros.
# If you copy this cloud-config manually, replace each ${{ ... }} placeholder
# before provisioning.

ssh_pwauth: false
disable_root: true

package_upgrade: true

packages:
  - ca-certificates
  - curl
  - debian-archive-keyring
  - debian-keyring
  - fail2ban
  - gpg
  - nodejs
  - ufw
  - unattended-upgrades

groups:
  - app

users:
  - name: deploy
    groups: [sudo]
    shell: /bin/bash
    lock_passwd: true
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys: ${{ __SSH_AUTHORIZED_KEYS__ }}

  - name: app
    system: true
    primary_group: app
    shell: /usr/sbin/nologin
    lock_passwd: true

write_files:
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root:root
    permissions: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

  - path: /etc/fail2ban/jail.d/sshd.local
    owner: root:root
    permissions: "0644"
    content: |
      [sshd]
      enabled = true
      backend = systemd
      banaction = ufw
      port = ssh
      maxretry = 5
      findtime = 10m
      bantime = 1h

  - path: /opt/hello/server.js
    owner: root:root
    permissions: "0644"
    content: |
      const http = require("http");

      const host = "127.0.0.1";
      const port = 3000;

      const server = http.createServer((request, response) => {
        response.writeHead(200, {
          "Content-Type": "text/plain; charset=utf-8",
        });
        response.end("Hello world\n");
      });

      server.listen(port, host, () => {
        console.log(`Hello world server listening on http://${host}:${port}`);
      });

  - path: /opt/hello/Caddyfile
    owner: root:root
    permissions: "0644"
    content: |
      ${{ __PUBLIC_DOMAIN__ }} {
        encode zstd gzip

        header {
          defer

          # Enable HSTS for the configured domain
          Strict-Transport-Security "max-age=31536000"

          # Disable clients from sniffing the media type
          X-Content-Type-Options "nosniff"

          # Add clickjacking protection
          X-Frame-Options "DENY"

          # Limit cross-origin referrer details
          Referrer-Policy "strict-origin-when-cross-origin"
        }

        reverse_proxy 127.0.0.1:3000 {
          header_up X-Forwarded-For {http.request.header.CF-Connecting-IP}
        }
      }

  - path: /etc/systemd/system/hello-node.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=Node.js hello world server
      After=network-online.target
      Wants=network-online.target

      [Service]
      User=app
      WorkingDirectory=/opt/hello
      ExecStart=/usr/bin/node /opt/hello/server.js
      Restart=always
      RestartSec=5
      Environment=NODE_ENV=production

      [Install]
      WantedBy=multi-user.target

runcmd:
  - set -eu

  # Set up UFW
  - |
    ufw default deny incoming
    ufw default allow outgoing
    ufw limit 22/tcp

    cloudflare_ipv4="$(curl -fsSL https://www.cloudflare.com/ips-v4)"
    for range in $cloudflare_ipv4; do
      ufw allow from "$range" to any port 80 proto tcp
      ufw allow from "$range" to any port 443 proto tcp
    done

    cloudflare_ipv6="$(curl -fsSL https://www.cloudflare.com/ips-v6)"
    for range in $cloudflare_ipv6; do
      ufw allow from "$range" to any port 80 proto tcp
      ufw allow from "$range" to any port 443 proto tcp
    done

    ufw --force enable

  # Set up Caddy
  - curl -1sLf -o /run/caddy-stable-gpg.key 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key'
  - gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg /run/caddy-stable-gpg.key
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' > /etc/apt/sources.list.d/caddy-stable.list
  - chmod o+r /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  - chmod o+r /etc/apt/sources.list.d/caddy-stable.list
  - apt-get update
  - apt-get install -y caddy

  # Set up Litestream
  - curl -fsSL -o /run/litestream.deb https://github.com/benbjohnson/litestream/releases/download/v0.5.8/litestream-0.5.8-linux-x86_64.deb
  - dpkg -i /run/litestream.deb
  - systemctl enable --now litestream

  # Set up the Node.js app behind Caddy
  - systemctl daemon-reload
  - systemctl enable --now hello-node
  - install -o root -g root -m 0644 /opt/hello/Caddyfile /etc/caddy/Caddyfile
  - caddy validate --config /etc/caddy/Caddyfile
  - systemctl restart caddy

power_state:
  mode: reboot

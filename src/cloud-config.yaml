#cloud-config

ssh_pwauth: false
disable_root: true

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - curl
  - debian-archive-keyring
  - debian-keyring
  - fail2ban
  - gpg
  - nodejs
  - unattended-upgrades

groups:
  - app

users:
  - name: deploy
    groups: [sudo]
    shell: /bin/bash
    lock_passwd: true
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys: ${{ __SSH_AUTHORIZED_KEYS__ }}

  - name: app
    system: true
    primary_group: app
    shell: /usr/sbin/nologin
    lock_passwd: true

write_files:
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root:root
    permissions: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

  - path: /etc/fail2ban/jail.d/sshd.local
    owner: root:root
    permissions: "0644"
    content: |
      [sshd]
      enabled = true
      backend = systemd
      banaction = ufw
      port = ssh
      maxretry = 5
      findtime = 10m
      bantime = 1h

  - path: /opt/hello/server.js
    owner: root:root
    permissions: "0644"
    content: |
      const http = require("http");

      const host = "127.0.0.1";
      const port = 3000;

      const server = http.createServer((request, response) => {
        response.writeHead(200, {
          "Content-Type": "text/plain; charset=utf-8",
        });
        response.end("Hello world\n");
      });

      server.listen(port, host, () => {
        console.log(`Hello world server listening on http://${host}:${port}`);
      });

  - path: /opt/hello/Caddyfile
    owner: root:root
    permissions: "0644"
    content: |
      ${{ __PUBLIC_DOMAIN__ }} {
        encode zstd gzip
        reverse_proxy 127.0.0.1:3000
      }

  - path: /etc/systemd/system/hello-node.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=Node.js hello world server
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=app
      Group=app
      WorkingDirectory=/opt/hello
      ExecStart=/usr/bin/node /opt/hello/server.js
      Restart=always
      RestartSec=5
      Environment=NODE_ENV=production

      [Install]
      WantedBy=multi-user.target

  - path: /usr/local/sbin/bootstrap-auto-upgrades
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      systemctl enable --now apt-daily.timer apt-daily-upgrade.timer

  - path: /usr/local/sbin/bootstrap-firewall
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      ufw default deny incoming
      ufw default allow outgoing
      ufw limit 22/tcp comment "SSH"
      ufw allow 80/tcp comment "HTTP"
      ufw allow 443/tcp comment "HTTPS"
      ufw --force enable

  - path: /usr/local/sbin/bootstrap-fail2ban
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      systemctl enable --now fail2ban

  - path: /usr/local/sbin/bootstrap-litestream
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      curl -L -o /tmp/litestream.deb https://github.com/benbjohnson/litestream/releases/download/v0.5.8/litestream-0.5.8-linux-x86_64.deb
      dpkg -i /tmp/litestream.deb
      systemctl enable --now litestream

  - path: /usr/local/sbin/bootstrap-app
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      systemctl daemon-reload
      systemctl enable --now hello-node

  - path: /usr/local/sbin/bootstrap-caddy
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
      curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' > /etc/apt/sources.list.d/caddy-stable.list
      chmod o+r /usr/share/keyrings/caddy-stable-archive-keyring.gpg
      chmod o+r /etc/apt/sources.list.d/caddy-stable.list
      apt-get update
      apt-get install -y caddy
      install -o root -g root -m 0644 /opt/hello/Caddyfile /etc/caddy/Caddyfile
      caddy validate --config /etc/caddy/Caddyfile
      systemctl enable caddy
      systemctl restart caddy

runcmd:
  - [ /usr/local/sbin/bootstrap-auto-upgrades ]
  - [ /usr/local/sbin/bootstrap-firewall ]
  - [ /usr/local/sbin/bootstrap-fail2ban ]
  - [ /usr/local/sbin/bootstrap-litestream ]
  - [ /usr/local/sbin/bootstrap-app ]
  - [ /usr/local/sbin/bootstrap-caddy ]

power_state:
  mode: reboot

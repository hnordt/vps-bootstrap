#cloud-config

# NOTE:
# This cloud-config targets Debian-based systems. If you copy it manually,
# replace each ${{ ... }} placeholder before provisioning.

ssh_pwauth: false
disable_root: true

package_upgrade: true

packages:
  - ca-certificates
  - curl
  - fail2ban
  - gpg
  - nodejs
  - ufw
  - unattended-upgrades

groups:
  - app

users:
  - name: deploy
    groups: [sudo]
    shell: /bin/bash
    lock_passwd: true
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys: ${{ __SSH_AUTHORIZED_KEYS__ }}

  - name: app
    system: true
    primary_group: app
    shell: /usr/sbin/nologin
    lock_passwd: true

write_files:
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root:root
    permissions: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

  - path: /etc/fail2ban/jail.d/sshd.local
    owner: root:root
    permissions: "0644"
    content: |
      [sshd]
      enabled = true
      backend = systemd
      banaction = ufw
      port = ssh
      maxretry = 5
      findtime = 10m
      bantime = 1h

  - path: /etc/app/.env
    owner: root:app
    permissions: "0640"
    defer: true
    content: |
      # Add app config and secrets as KEY=value lines.
      # Prefer injecting real secrets after provisioning.

  - path: /opt/app/server.js
    owner: root:root
    permissions: "0644"
    content: |
      const http = require("http");
      const path = require("path");
      const { DatabaseSync } = require("node:sqlite");

      const host = "127.0.0.1";
      const port = 3000;

      const db = new DatabaseSync(
        path.join(process.env.STATE_DIRECTORY ?? ".", "app.db"),
      );

      db.exec("PRAGMA journal_mode = WAL");
      db.exec(`
        CREATE TABLE IF NOT EXISTS visits (
          id INTEGER PRIMARY KEY,
          visited_at TEXT NOT NULL DEFAULT (datetime('now'))
        )
      `);

      const insertVisit = db.prepare("INSERT INTO visits DEFAULT VALUES");
      const countVisits = db.prepare("SELECT count(*) AS count FROM visits");

      const server = http.createServer((request, response) => {
        insertVisit.run();
        const { count } = countVisits.get();

        response.writeHead(200, {
          "Content-Type": "text/plain; charset=utf-8",
        });
        response.end(`Hello world\nVisits: ${count}\n`);
      });

      server.listen(port, host, () => {
        console.log(`Hello world server listening on http://${host}:${port}`);
      });

  - path: /etc/systemd/system/app.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=Application server
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=app
      WorkingDirectory=/opt/app
      StateDirectory=app
      EnvironmentFile=-/etc/app/.env
      ExecStart=/usr/bin/node /opt/app/server.js
      Restart=always
      RestartSec=5
      NoNewPrivileges=true
      ProtectSystem=strict
      PrivateTmp=true

      [Install]
      WantedBy=multi-user.target

  - path: /opt/app/Caddyfile
    owner: root:root
    permissions: "0644"
    content: |
      ${{ __PUBLIC_DOMAIN__ }} {
        encode zstd gzip

        header {
          defer

          Strict-Transport-Security "max-age=31536000"
          X-Content-Type-Options "nosniff"
          X-Frame-Options "DENY"
          Referrer-Policy "strict-origin-when-cross-origin"
        }

        reverse_proxy 127.0.0.1:3000 {
          header_up X-Forwarded-For {http.request.header.CF-Connecting-IP}
        }
      }

  - path: /etc/litestream.yml
    owner: root:root
    permissions: "0600"
    content: |
      dbs:
        - path: /var/lib/app/app.db
          replica:
            type: file
            path: /var/backups/app

      # Cloudflare R2 example
      # dbs:
      #   - path: /var/lib/app/app.db
      #     replica:
      #       type: s3
      #       endpoint: https://YOUR_ACCOUNT_ID.r2.cloudflarestorage.com
      #       region: auto
      #       bucket: your-bucket
      #       path: app
      #       access-key-id: your-key-id
      #       secret-access-key: your-secret

runcmd:
  - set -eu

  # Set up UFW
  - |
    ufw default deny incoming
    ufw default allow outgoing
    ufw limit 22/tcp
    ufw --force enable
    ips_v4="$(curl -fsSL https://www.cloudflare.com/ips-v4)"
    ips_v6="$(curl -fsSL https://www.cloudflare.com/ips-v6)"
    for range in $ips_v4 $ips_v6; do
      ufw allow proto tcp from "$range" to any port 80,443
    done

  # Set up the app service
  - |
    systemctl daemon-reload
    systemctl enable --now app

  # Set up Caddy
  - |
    curl -fsSL https://dl.cloudsmith.io/public/caddy/stable/gpg.key | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
    curl -fsSL -o /etc/apt/sources.list.d/caddy-stable.list https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt
    apt-get update
    apt-get install -y caddy
    install -m 0644 /opt/app/Caddyfile /etc/caddy/Caddyfile
    caddy validate --config /etc/caddy/Caddyfile
    systemctl restart caddy

  # Set up Litestream
  - |
    curl -fsSL -o /run/litestream.deb https://github.com/benbjohnson/litestream/releases/download/v0.5.8/litestream-0.5.8-linux-x86_64.deb
    apt-get install -y /run/litestream.deb
    systemctl enable --now litestream

power_state:
  mode: reboot

#cloud-config

ssh_pwauth: false
disable_root: true

package_update: true
package_upgrade: true

groups:
  - app

users:
  - name: deploy
    groups: [sudo]
    shell: /bin/bash
    lock_passwd: true
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys: ${{ __SSH_AUTHORIZED_KEYS__ }}

  - name: app
    system: true
    groups: [app]
    shell: /usr/sbin/nologin
    lock_passwd: true

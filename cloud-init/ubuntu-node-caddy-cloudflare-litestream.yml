#cloud-config
# Target: Ubuntu 24.04 LTS on a VPS provider.
# Replace every __PLACEHOLDER__ before deploying.

package_update: true
package_upgrade: true
timezone: America/Sao_Paulo

groups:
  - app

users:
  - name: deploy
    groups: [sudo, app]
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    lock_passwd: true
    ssh_authorized_keys:
      - __SSH_PUBLIC_KEY__

  - name: app
    system: true
    shell: /usr/sbin/nologin
    groups: [app]
    lock_passwd: true

ssh_pwauth: false
disable_root: true

packages:
  - ufw
  - fail2ban
  - unattended-upgrades
  - curl
  - ca-certificates
  - gnupg
  - jq
  - sqlite3

write_files:
  - path: /etc/fail2ban/jail.d/sshd.local
    permissions: "0644"
    owner: root:root
    content: |
      [DEFAULT]
      backend = systemd
      banaction = ufw

      [sshd]
      enabled = true
      maxretry = 5
      findtime = 10m
      bantime = 1h

  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: "0644"
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

  - path: /opt/bootstrap/Caddyfile
    permissions: "0644"
    owner: root:root
    content: |
      {
        admin off
      }

      __DOMAIN__ {
        tls /etc/caddy/certs/origin.pem /etc/caddy/certs/origin.key
        encode zstd gzip
        reverse_proxy 127.0.0.1:3000
      }

  - path: /opt/bootstrap/origin.pem
    permissions: "0600"
    owner: root:root
    content: |
      __CLOUDFLARE_ORIGIN_CERT_PEM__

  - path: /opt/bootstrap/origin.key
    permissions: "0600"
    owner: root:root
    content: |
      __CLOUDFLARE_ORIGIN_KEY_PEM__

  - path: /opt/bootstrap/litestream.yml
    permissions: "0600"
    owner: root:root
    content: |
      dbs:
        - path: /var/lib/app/data.db
          replica:
            type: s3
            endpoint: __S3_ENDPOINT__
            region: __S3_REGION__
            bucket: __S3_BUCKET__
            path: data.db
            access-key-id: __S3_ACCESS_KEY_ID__
            secret-access-key: __S3_SECRET_ACCESS_KEY__

  - path: /etc/systemd/system/litestream.service
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=Litestream SQLite replication
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=app
      Group=app
      ExecStartPre=/usr/local/bin/litestream restore -config /etc/litestream.yml -if-db-not-exists -if-replica-exists /var/lib/app/data.db
      ExecStart=/usr/local/bin/litestream replicate -config /etc/litestream.yml
      Restart=always
      RestartSec=5
      NoNewPrivileges=true
      PrivateTmp=true
      ProtectHome=true
      ProtectSystem=strict
      ReadWritePaths=/var/lib/app

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/app.service
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=Node app
      After=network-online.target litestream.service
      Wants=network-online.target litestream.service

      [Service]
      Type=simple
      User=app
      Group=app
      WorkingDirectory=/var/lib/app/current
      ExecStart=/usr/bin/node /var/lib/app/current/server.js
      Environment=NODE_ENV=production
      Environment=HOST=127.0.0.1
      Environment=PORT=3000
      Environment=DATABASE_URL=/var/lib/app/data.db
      Restart=on-failure
      RestartSec=5
      NoNewPrivileges=true
      PrivateTmp=true
      ProtectSystem=strict
      ProtectHome=true
      ReadWritePaths=/var/lib/app

      [Install]
      WantedBy=multi-user.target

  - path: /usr/local/bin/cf-ufw-sync
    permissions: "0755"
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      while ufw status numbered | grep -q "Cloudflare"; do
        n="$(ufw status numbered | grep "Cloudflare" | head -n1 | sed -E 's/^\[ *([0-9]+)\].*/\1/')"
        ufw --force delete "$n"
      done

      for ip in $(curl -fsS https://www.cloudflare.com/ips-v4) \
                $(curl -fsS https://www.cloudflare.com/ips-v6); do
        ufw allow proto tcp from "$ip" to any port 443 comment "Cloudflare"
      done

  - path: /etc/systemd/system/cf-ufw-sync.service
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=Sync UFW allowlist with Cloudflare IP ranges
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/cf-ufw-sync

  - path: /etc/systemd/system/cf-ufw-sync.timer
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=Weekly Cloudflare IP range sync

      [Timer]
      OnCalendar=weekly
      Persistent=true

      [Install]
      WantedBy=timers.target

runcmd:
  - install -d -o app -g app -m 0750 /var/lib/app/current
  - install -d -o root -g root -m 0750 /etc/caddy/certs

  - |
    NODE_MAJOR=22
    install -d -m 0755 /etc/apt/keyrings
    curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key \
      | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
    echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_${NODE_MAJOR}.x nodistro main" \
      > /etc/apt/sources.list.d/nodesource.list
    apt-get update
    apt-get install -y nodejs

  - |
    install -d -m 0755 /etc/apt/keyrings
    curl -fsSL https://dl.cloudsmith.io/public/caddy/stable/gpg.key \
      | gpg --dearmor -o /etc/apt/keyrings/caddy-stable-archive-keyring.gpg
    curl -fsSL https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt \
      > /etc/apt/sources.list.d/caddy-stable.list
    apt-get update
    apt-get install -y caddy

  - cp /opt/bootstrap/origin.pem /etc/caddy/certs/origin.pem
  - cp /opt/bootstrap/origin.key /etc/caddy/certs/origin.key
  - cp /opt/bootstrap/Caddyfile /etc/caddy/Caddyfile
  - chown -R root:caddy /etc/caddy/certs
  - chmod 0750 /etc/caddy/certs
  - chmod 0640 /etc/caddy/certs/origin.pem /etc/caddy/certs/origin.key

  - |
    ARCH="$(dpkg --print-architecture)"
    case "$ARCH" in
      amd64) LITESTREAM_ARCH="amd64" ;;
      arm64) LITESTREAM_ARCH="arm64" ;;
      *) echo "Unsupported architecture: $ARCH" && exit 1 ;;
    esac

    LITESTREAM_URL="$(
      curl -fsSL https://api.github.com/repos/benbjohnson/litestream/releases/latest \
        | jq -r ".assets[] | select(.name | test(\"linux-${LITESTREAM_ARCH}.*tar.gz$\")) | .browser_download_url" \
        | head -n 1
    )"

    test -n "$LITESTREAM_URL"
    curl -fsSL "$LITESTREAM_URL" -o /tmp/litestream.tar.gz
    tar -xzf /tmp/litestream.tar.gz -C /usr/local/bin litestream
    chmod 0755 /usr/local/bin/litestream

  - cp /opt/bootstrap/litestream.yml /etc/litestream.yml
  - chown root:app /etc/litestream.yml
  - chmod 0640 /etc/litestream.yml

  - sudo -u app /usr/local/bin/litestream restore -config /etc/litestream.yml -if-db-not-exists -if-replica-exists /var/lib/app/data.db || true
  - test -f /var/lib/app/data.db || sudo -u app sqlite3 /var/lib/app/data.db "PRAGMA journal_mode=WAL;"

  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw limit 22/tcp comment "SSH"
  - /usr/local/bin/cf-ufw-sync
  - ufw --force enable

  - systemctl daemon-reload
  - systemctl enable --now cf-ufw-sync.timer
  - systemctl enable --now fail2ban
  - systemctl enable --now litestream
  - systemctl enable app
  - systemctl enable --now caddy

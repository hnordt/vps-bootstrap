#cloud-config

package_update: true
package_upgrade: true
timezone: America/Sao_Paulo

groups:
  - app

users:
  - name: deploy
    gecos: Deploy User
    shell: /bin/bash
    groups: [sudo, app]
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    lock_passwd: true
    ssh_authorized_keys:
      - YOUR_SSH_PUBLIC_KEY

  - name: app
    system: true
    shell: /usr/sbin/nologin
    groups: [app]
    lock_passwd: true

ssh_pwauth: false
disable_root: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - jq
  - ufw
  - fail2ban
  - unattended-upgrades
  - sqlite3

write_files:
  - path: /opt/app/server.js
    permissions: "0644"
    owner: deploy:app
    content: |
      const http = require("node:http");

      const host = process.env.HOST ?? "127.0.0.1";
      const port = Number(process.env.PORT ?? 3000);

      const server = http.createServer((req, res) => {
        if (req.url === "/health") {
          res.writeHead(200, { "content-type": "application/json" });
          res.end(JSON.stringify({ ok: true }));
          return;
        }

        res.writeHead(200, { "content-type": "text/plain" });
        res.end("OK\n");
      });

      server.listen(port, host, () => {
        console.log(`Server listening on http://${host}:${port}`);
      });

  - path: /etc/systemd/system/app.service
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=Node application
      Wants=network-online.target litestream.service
      After=network-online.target litestream.service

      [Service]
      Type=simple
      User=app
      Group=app
      WorkingDirectory=/opt/app
      Environment=NODE_ENV=production
      Environment=HOST=127.0.0.1
      Environment=PORT=3000
      Environment=DATABASE_URL=/var/lib/app/app.sqlite
      ExecStart=/usr/bin/node /opt/app/server.js
      Restart=always
      RestartSec=3
      NoNewPrivileges=true
      PrivateTmp=true
      ProtectHome=true
      ProtectSystem=strict
      ReadWritePaths=/var/lib/app /var/log/app

      [Install]
      WantedBy=multi-user.target

  - path: /etc/litestream.yml
    permissions: "0644"
    owner: root:root
    content: |
      dbs:
        - path: /var/lib/app/app.sqlite
          replicas:
            - url: s3://YOUR_BUCKET_NAME/app.sqlite
              endpoint: https://YOUR_OBJECT_STORAGE_ENDPOINT
              region: us-east-1

  - path: /etc/litestream/env
    permissions: "0600"
    owner: root:root
    content: |
      AWS_ACCESS_KEY_ID=YOUR_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY=YOUR_SECRET_ACCESS_KEY

  - path: /etc/systemd/system/litestream.service
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=Litestream SQLite replication
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=app
      Group=app
      EnvironmentFile=/etc/litestream/env
      ExecStart=/usr/local/bin/litestream replicate -config /etc/litestream.yml
      Restart=always
      RestartSec=5
      NoNewPrivileges=true
      PrivateTmp=true
      ProtectHome=true
      ProtectSystem=strict
      ReadWritePaths=/var/lib/app /var/log/app

      [Install]
      WantedBy=multi-user.target

  - path: /etc/caddy/Caddyfile
    permissions: "0644"
    owner: root:root
    content: |
      {
        email admin@example.com
        admin off
      }

      app.example.com {
        encode zstd gzip
        reverse_proxy 127.0.0.1:3000
      }

runcmd:
  - install -d -o deploy -g app -m 0750 /opt/app
  - install -d -o app -g app -m 0750 /var/lib/app
  - install -d -o app -g app -m 0750 /var/log/app

  - sqlite3 /var/lib/app/app.sqlite "PRAGMA journal_mode=WAL;"
  - chown app:app /var/lib/app/app.sqlite*

  - |
    NODE_MAJOR=22
    install -d -m 0755 /etc/apt/keyrings
    curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key \
      | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
    echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_${NODE_MAJOR}.x nodistro main" \
      > /etc/apt/sources.list.d/nodesource.list
    apt-get update
    apt-get install -y nodejs

  - |
    install -d -m 0755 /etc/apt/keyrings
    curl -fsSL https://dl.cloudsmith.io/public/caddy/stable/gpg.key \
      | gpg --dearmor -o /etc/apt/keyrings/caddy-stable-archive-keyring.gpg
    curl -fsSL https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt \
      > /etc/apt/sources.list.d/caddy-stable.list
    apt-get update
    apt-get install -y caddy

  - |
    ARCH="$(dpkg --print-architecture)"
    case "$ARCH" in
      amd64) LITESTREAM_ARCH="amd64" ;;
      arm64) LITESTREAM_ARCH="arm64" ;;
      *) echo "Unsupported architecture: $ARCH" && exit 1 ;;
    esac

    LITESTREAM_URL="$(
      curl -fsSL https://api.github.com/repos/benbjohnson/litestream/releases/latest \
        | jq -r ".assets[] | select(.name | test(\"linux-${LITESTREAM_ARCH}.*tar.gz$\")) | .browser_download_url" \
        | head -n 1
    )"

    test -n "$LITESTREAM_URL"
    curl -fsSL "$LITESTREAM_URL" -o /tmp/litestream.tar.gz
    tar -xzf /tmp/litestream.tar.gz -C /usr/local/bin litestream
    chmod 0755 /usr/local/bin/litestream
    rm -f /tmp/litestream.tar.gz

  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw limit 22/tcp comment "SSH"
  - ufw allow 443/tcp comment "HTTPS"
  - ufw --force enable

  - dpkg-reconfigure -f noninteractive unattended-upgrades
  - systemctl daemon-reload
  - systemctl enable litestream
  - systemctl restart litestream
  - systemctl enable app
  - systemctl restart app
  - systemctl enable caddy
  - systemctl restart caddy
  - systemctl enable fail2ban
  - systemctl restart fail2ban
